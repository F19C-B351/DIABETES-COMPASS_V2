<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Diagnostic Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .test {
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-left: 4px solid #999;
            border-radius: 4px;
        }

        .test.success {
            border-left-color: #28a745;
            background: #d4edda;
        }

        .test.error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        .test-title {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 1.05rem;
        }

        .test-content {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #333;
            word-break: break-all;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-2px);
        }

        .console-output {
            background: #000;
            color: #0f0;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .console-line {
            margin: 2px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔧 Supabase Diagnostic Test</h1>

        <div id="results"></div>

        <div class="button-group">
            <button onclick="testSupabaseInit()">Test Supabase Init</button>
            <button onclick="testFetchAPI()">Test Fetch API</button>
            <button onclick="testCDNLoad()">Test CDN Load</button>
            <button onclick="clearConsole()">Clear</button>
        </div>

        <div class="console-output" id="console"></div>
    </div>

    <!-- Supabase Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
    <script src="supabase-init.js"></script>

    <script>
        // Capture console logs
        const consoleDiv = document.getElementById('console');
        const originalLog = console.log;
        const originalError = console.error;

        function log(msg) {
            originalLog(msg);
            const line = document.createElement('div');
            line.className = 'console-line';
            line.textContent = '> ' + msg;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function error(msg) {
            originalError(msg);
            const line = document.createElement('div');
            line.className = 'console-line';
            line.style.color = '#ff6b6b';
            line.textContent = '❌ ' + msg;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        console.log = log;
        console.error = error;

        const results = document.getElementById('results');

        function addResult(title, content, isSuccess = true) {
            const div = document.createElement('div');
            div.className = `test ${isSuccess ? 'success' : 'error'}`;
            div.innerHTML = `
                <div class="test-title">${isSuccess ? '✓' : '✗'} ${title}</div>
                <div class="test-content">${content}</div>
            `;
            results.appendChild(div);
        }

        function clearConsole() {
            consoleDiv.innerHTML = '';
            results.innerHTML = '';
        }

        async function testSupabaseInit() {
            clearConsole();
            log('Testing Supabase Initialization...');

            try {
                // Wait for Supabase to be available
                let supabase = null;
                let attempts = 0;
                while (!supabase && attempts < 50) {
                    supabase = window.supabase;
                    if (!supabase) {
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                    attempts++;
                }

                if (!supabase) {
                    throw new Error('Supabase not available after 5 seconds');
                }

                log('✓ Supabase client is available');
                addResult('Supabase Client', 'Client initialized successfully', true);

                // Test connection
                log('Testing database connection...');
                const { data, error } = await supabase
                    .from('profiles')
                    .select('count', { count: 'exact', head: true });

                if (error) {
                    throw new Error(error.message);
                }

                log('✓ Database connection successful');
                addResult('Database Connection', 'Connected to profiles table', true);

            } catch (e) {
                log('Error: ' + e.message);
                addResult('Supabase Test', 'ERROR: ' + e.message, false);
            }
        }

        async function testFetchAPI() {
            clearConsole();
            log('Testing Fetch API...');

            try {
                log('Fetching https://api.github.com...');
                const response = await fetch('https://api.github.com');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                log('✓ Fetch API works');
                addResult('Fetch API', 'Successfully fetched from GitHub API', true);

            } catch (e) {
                log('Error: ' + e.message);
                addResult('Fetch API', 'ERROR: ' + e.message, false);
            }
        }

        function testCDNLoad() {
            clearConsole();
            log('Checking CDN libraries...');

            try {
                if (window.supabase) {
                    log('✓ Supabase library loaded');
                    addResult('CDN Load', 'Supabase@2.39.0 loaded from CDN', true);
                } else {
                    log('Waiting for Supabase...');
                }

                if (typeof fetch !== 'undefined') {
                    log('✓ Fetch API available');
                    addResult('Fetch API', 'Native fetch available', true);
                }

            } catch (e) {
                log('Error: ' + e.message);
                addResult('CDN Load', 'ERROR: ' + e.message, false);
            }
        }

        // Run initial tests
        window.addEventListener('load', () => {
            log('Page loaded');
            log('Checking available APIs...');

            if (window.supabase) {
                addResult('Supabase CDN', 'Library loaded on page load', true);
            }

            if (typeof fetch !== 'undefined') {
                addResult('Fetch API', 'Available', true);
            }
        });
    </script>
</body>

</html>
