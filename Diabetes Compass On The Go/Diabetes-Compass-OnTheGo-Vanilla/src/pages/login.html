<!-- Top Navbar with Login Button -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Diabetes Compass</a>
        <div class="d-flex ms-auto">
            <button id="show-login-btn" class="btn btn-outline-primary">Login</button>
        </div>
    </div>
</nav>

<!-- Login Page (hidden by default, shown when Login button is clicked) -->
<div id="login-modal"
    style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.3); z-index:1050;">
    <div class="container mt-5"
        style="max-width: 400px; background:#fff; border-radius:8px; box-shadow:0 2px 16px rgba(0,0,0,0.2); padding:2rem; position:relative; top:10vh;">
        <button type="button" id="close-login-modal" class="btn-close position-absolute end-0 top-0 m-3"
            aria-label="Close"></button>
        <h2 class="mb-4 text-center">Login</h2>
        <form id="login-form">
            <div class="mb-3">
                <label for="login-email" class="form-label">Email</label>
                <input type="email" class="form-control" id="login-email" required />
            </div>
            <div class="mb-3">
                <label for="login-password" class="form-label">Password</label>
                <input type="password" class="form-control" id="login-password" required />
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <div id="login-error" class="text-danger mt-3" style="display:none;"></div>
        <div class="mt-3 text-center">
            <span>Don't have an account? <a href="#" id="show-register-link">Register</a></span>
        </div>
    </div>
</div>

<!-- Registration Modal Popup -->
<div id="register-modal"
    style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.3); z-index:1060;">
    <div class="container mt-5"
        style="max-width: 400px; background:#fff; border-radius:8px; box-shadow:0 2px 16px rgba(0,0,0,0.2); padding:2rem; position:relative; top:10vh;">
        <button type="button" id="close-register-modal" class="btn-close position-absolute end-0 top-0 m-3"
            aria-label="Close"></button>
        <h2 class="mb-4 text-center">Register</h2>
        <form id="register-form">
            <div class="mb-3">
                <label for="register-email" class="form-label">Email</label>
                <input type="email" class="form-control" id="register-email" required />
            </div>
            <div class="mb-3">
                <label for="register-password" class="form-label">Password</label>
                <input type="password" class="form-control" id="register-password" required />
            </div>
            <div class="mb-3">
                <label for="register-name" class="form-label">Name</label>
                <input type="text" class="form-control" id="register-name" required />
            </div>
            <div class="mb-3">
                <label for="register-diabetes-type" class="form-label">Diabetes Type</label>
                <select class="form-select" id="register-diabetes-type" required>
                    <option value="">Select type</option>
                    <option value="Type 1">Type 1</option>
                    <option value="Type 2">Type 2</option>
                    <option value="Gestational">Gestational</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="register-glucose-unit" class="form-label">Glucose Unit</label>
                <select class="form-select" id="register-glucose-unit" required>
                    <option value="mmol/L">mmol/L</option>
                    <option value="mg/dL">mg/dL</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Insulin User</label>
                <div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="register-insulin-user"
                            id="register-insulin-yes" value="Yes" required />
                        <label class="form-check-label" for="register-insulin-yes">Yes</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="register-insulin-user"
                            id="register-insulin-no" value="No" required />
                        <label class="form-check-label" for="register-insulin-no">No</label>
                    </div>
                </div>
            </div>
            <div id="register-error" class="text-danger mt-3" style="display:none;"></div>
            <div id="register-success" class="text-success mt-3" style="display:none;"></div>
            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <div class="mt-3 text-center">
            <span>Already have an account? <a href="#" id="show-login-link">Login</a></span>
        </div>
    </div>
</div>

<!-- Profile Fields (to be shown after login) -->
<div class="container mt-5" id="profile-section" style="max-width: 400px; display:none;">
    <h2 class="mb-4 text-center">Profile</h2>
    <form id="profile-form">
        <div class="mb-3">
            <label for="profile-name" class="form-label">Name</label>
            <input type="text" class="form-control" id="profile-name" required />
        </div>
        <div class="mb-3">
            <label for="profile-diabetes-type" class="form-label">Diabetes Type</label>
            <select class="form-select" id="profile-diabetes-type" required>
                <option value="">Select type</option>
                <option value="Type 1">Type 1</option>
                <option value="Type 2">Type 2</option>
                <option value="Gestational">Gestational</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="profile-glucose-unit" class="form-label">Glucose Unit</label>
            <select class="form-select" id="profile-glucose-unit" required>
                <option value="mmol/L">mmol/L</option>
                <option value="mg/dL">mg/dL</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Insulin User</label>
            <div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="insulin-user" id="insulin-yes" value="Yes"
                        required />
                    <label class="form-check-label" for="insulin-yes">Yes</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="insulin-user" id="insulin-no" value="No"
                        required />
                    <label class="form-check-label" for="insulin-no">No</label>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-success w-100">Save Profile</button>
    </form>
    <div id="profile-success" class="text-success mt-3" style="display:none;"></div>
</div>

</div>

<!-- Supabase JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Supabase Client Config -->
<script src="supabaseClient.js"></script>
<!-- Login Logic -->
<script src="login.js"></script>
<script>
    // Show/hide login/register modal logic
    document.addEventListener('DOMContentLoaded', function () {
        const loginModal = document.getElementById('login-modal');
        const showLoginBtn = document.getElementById('show-login-btn');
        const closeLoginModal = document.getElementById('close-login-modal');
        const registerModal = document.getElementById('register-modal');
        const showRegisterLink = document.getElementById('show-register-link');
        const closeRegisterModal = document.getElementById('close-register-modal');
        const showLoginLink = document.getElementById('show-login-link');

        if (showLoginBtn && loginModal) {
            showLoginBtn.addEventListener('click', function () {
                loginModal.style.display = 'block';
            });
        }
        if (closeLoginModal && loginModal) {
            closeLoginModal.addEventListener('click', function () {
                loginModal.style.display = 'none';
            });
        }
        // Show register modal from login modal
        if (showRegisterLink && registerModal && loginModal) {
            showRegisterLink.addEventListener('click', function (e) {
                e.preventDefault();
                loginModal.style.display = 'none';
                registerModal.style.display = 'block';
            });
        }
        // Show login modal from register modal
        if (showLoginLink && registerModal && loginModal) {
            showLoginLink.addEventListener('click', function (e) {
                e.preventDefault();
                registerModal.style.display = 'none';
                loginModal.style.display = 'block';
            });
        }
        // Close register modal
        if (closeRegisterModal && registerModal) {
            closeRegisterModal.addEventListener('click', function () {
                registerModal.style.display = 'none';
            });
        }
        // Optional: Close modals with Escape key
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                if (loginModal && loginModal.style.display === 'block') loginModal.style.display = 'none';
                if (registerModal && registerModal.style.display === 'block') registerModal.style.display = 'none';
            }
        });
    });
</script>
</div>
