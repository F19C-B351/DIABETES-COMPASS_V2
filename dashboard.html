<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Compass - Analytics Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="modal-styles.css">
    <link rel="stylesheet" href="user-styles.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 60px auto 40px;
            padding: 20px;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .dashboard-header h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .dashboard-header p {
            color: #666;
            font-size: 1.1rem;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .metric-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            border-top: 4px solid #667eea;
        }

        .metric-title {
            color: #666;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .metric-subtitle {
            color: #999;
            font-size: 0.85rem;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }

        .chart-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            height: 250px;
        }

        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .bar {
            width: 100%;
            max-width: 80px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px 8px 0 0;
            transition: all 0.3s;
            cursor: pointer;
        }

        .bar:hover {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            transform: translateY(-5px);
        }

        .bar-label {
            margin-top: 10px;
            font-weight: 600;
            color: #333;
            text-align: center;
            font-size: 0.9rem;
        }

        .bar-value {
            text-align: center;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.5rem;
        }

        .legend {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .legend-color.type1 {
            background: #c41e3a;
        }

        .legend-color.type2 {
            background: #0066cc;
        }

        .legend-color.gestational {
            background: #ff9800;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 15px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn-action {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-action:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-action.secondary {
            background: #6c757d;
        }

        .btn-action.secondary:hover {
            background: #5a6268;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>📊 Analytics Dashboard</h1>
            <p>Real-time data from Supabase</p>
        </div>

        <div class="action-buttons">
            <button class="btn-action" onclick="loadAnalytics()">🔄 Refresh Analytics</button>
            <button class="btn-action secondary" onclick="window.location.href='/'">← Back Home</button>
        </div>

        <div id="message"></div>
        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <span>Loading analytics from Supabase...</span>
        </div>

        <div id="metricsContainer"></div>
        <div id="chartsContainer"></div>
    </div>

    <!-- Supabase Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
    <script src="supabase-init.js"></script>

    <script>
        const SUPABASE_URL = 'https://uzwinhyzipndpjxmprns.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6d2luaHl6aXBuZHBqeG1wcm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxODc0MDUsImV4cCI6MjA4Nzc2MzQwNX0.-nDE5lYtJa5qUL06BT-Hh_EJ5d-Xns3nCyRRNfMb7G4';

        async function fetchProfilesViaREST() {
            const url = `${SUPABASE_URL}/rest/v1/profiles?select=*&order=created_at.desc`;
            console.log('Fetching from REST API:', url);
            const response = await fetch(url, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                }
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            return await response.json();
        }

        async function loadAnalytics() {
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');
            const metricsContainer = document.getElementById('metricsContainer');
            const chartsContainer = document.getElementById('chartsContainer');

            loading.style.display = 'block';
            message.innerHTML = '';
            metricsContainer.innerHTML = '';
            chartsContainer.innerHTML = '';

            try {
                console.log('🔄 loadAnalytics() called');
                let profiles = null;

                console.log('Attempting to fetch via REST API...');
                try {
                    profiles = await fetchProfilesViaREST();
                    console.log('✓ REST API successful, got ' + profiles.length + ' profiles');
                } catch (restError) {
                    console.warn('REST API failed:', restError.message);
                    if (!window.supabase) {
                        let count = 0;
                        while (!window.supabase && count < 100) {
                            await new Promise(resolve => setTimeout(resolve, 100));
                            count++;
                        }
                        if (!window.supabase) {
                            throw new Error('Supabase client not available');
                        }
                    }
                    const result = await window.supabase.from('profiles').select('*').order('created_at', { ascending: false });
                    if (result.error) {
                        throw result.error;
                    }
                    profiles = result.data;
                    console.log('✓ Client library successful');
                }

                loading.style.display = 'none';

                if (!profiles || profiles.length === 0) {
                    message.innerHTML = `
                        <div class="error-message">
                            No profiles found in database
                        </div>
                    `;
                    return;
                }

                console.log('Successfully fetched profiles:', profiles);

                // Show success message
                message.innerHTML = `
                    <div class="success-message">
                        ✓ Successfully connected to Supabase and loaded ${profiles.length} profile(s)
                    </div>
                `;

                // Calculate metrics
                const totalUsers = profiles.length;
                const insulinUsers = profiles.filter(p => p.insulin_user === 'Yes').length;
                const mgdlUsers = profiles.filter(p => p.glucose_unit === 'mg/dL').length;

                // Count by type
                const type1 = profiles.filter(p => p.diabetes_type === 'Type 1').length;
                const type2 = profiles.filter(p => p.diabetes_type === 'Type 2').length;
                const gestational = profiles.filter(p => p.diabetes_type === 'Gestational').length;

                // Display metrics
                metricsContainer.innerHTML = `
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="metric-title">Total Users</div>
                            <div class="metric-value">${totalUsers}</div>
                            <div class="metric-subtitle">Registered profiles</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-title">Insulin Users</div>
                            <div class="metric-value">${insulinUsers}</div>
                            <div class="metric-subtitle">${((insulinUsers / totalUsers) * 100).toFixed(1)}% of users</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-title">mg/dL Users</div>
                            <div class="metric-value">${mgdlUsers}</div>
                            <div class="metric-subtitle">${((mgdlUsers / totalUsers) * 100).toFixed(1)}% of users</div>
                        </div>
                    </div>
                `;

                // Display charts
                const maxCount = Math.max(type1, type2, gestational);
                const height1 = (type1 / maxCount) * 200;
                const height2 = (type2 / maxCount) * 200;
                const heightG = (gestational / maxCount) * 200;

                chartsContainer.innerHTML = `
                    <div class="chart-container">
                        <h3 class="chart-title">User Distribution by Diabetes Type</h3>
                        <div class="chart-bars">
                            <div class="bar-item">
                                <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                                    <div class="bar-value">${type1}</div>
                                    <div class="bar" style="height: ${height1}px;"></div>
                                </div>
                                <div class="bar-label">Type 1</div>
                            </div>
                            <div class="bar-item">
                                <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                                    <div class="bar-value">${type2}</div>
                                    <div class="bar" style="height: ${height2}px; background: linear-gradient(180deg, #0066cc 0%, #0052a3 100%);"></div>
                                </div>
                                <div class="bar-label">Type 2</div>
                            </div>
                            <div class="bar-item">
                                <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                                    <div class="bar-value">${gestational}</div>
                                    <div class="bar" style="height: ${heightG}px; background: linear-gradient(180deg, #ff9800 0%, #e68900 100%);"></div>
                                </div>
                                <div class="bar-label">Gestational</div>
                            </div>
                        </div>
                        <div class="legend">
                            <div class="legend-item">
                                <div class="legend-color type1"></div>
                                <span>Type 1 Diabetes</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color type2"></div>
                                <span>Type 2 Diabetes</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color gestational"></div>
                                <span>Gestational Diabetes</span>
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                loading.style.display = 'none';
                console.error('❌ Error loading analytics:', error);
                console.error('Stack:', error.stack);
                message.innerHTML = `
                    <div class="error-message">
                        <strong>❌ Connection Error:</strong> ${error.message}<br/>
                        <small style="color: #555; margin-top: 10px; display: block;">Details: Check browser console (F12) for full error log</small>
                    </div>
                `;
            }
        }

        // Load analytics when page loads
        window.addEventListener('load', () => {
            setTimeout(loadAnalytics, 500);
        });
    </script>
</body>

</html>
